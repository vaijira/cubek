test-rocm-extended = "test --release --features cubecl/rocm,extended"
test-wgpu-extended = "test --release --features cubecl/wgpu,extended"
test-vulkan-extended = "test --release --features cubecl/vulkan,extended"
test-metal-extended = "test --release --features cubecl/metal,extended"

test-cpu-full = "test --release --features cubecl/cpu,full"
test-cuda-full = "test --release --features cubecl/cuda,full"
test-rocm-full = "test --release --features cubecl/rocm,full"
test-wgpu-full = "test --release --features cubecl/wgpu,full"
test-vulkan-full = "test --release --features cubecl/vulkan,full"
test-metal-full = "test --release --features cubecl/metal,full"
